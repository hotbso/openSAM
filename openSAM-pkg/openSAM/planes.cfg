# This config file specifies plane-specific settings, e.g. chocks, gpu, pca drefs and door positions for jetway connection
#
# Each plane config starts with an icao-regexp and optionally a studio match, followed by any number of settings. The first matching config will be used.
#
# The ramp equipment drefs compare dref to a value with a comparioson operator. Valid operators are "eq" (==), "ge" (>=), "gt" (>), "le" (<=), "lt" (<).
#
# The chk_set expression is a "command" to set the chocks. It is either "dref name_of_dref value" or "cmd name_of_command".
# In the first case value is written in <name_of_dref> to set the chocks, in the second case <name_of_command> is executed to set the chocks.
#
# dont_connect_jetway means that after "beacon off" the plugin should not connect a jetway, e.g. because Zibo has it's own handling.
#
# use_engines_on means that the standard beacon dataref is either not used or not reliable and instead engines should be monitored.
#
# Door position is in meters relative to the CG, axes: +x to the left, +y up, +z to the tail

# Toliss A21N
icao	A21N
studio	ToLiss
pax_no_dref	AirbusFBW/NoPax
chk_dref AirbusFBW/Chocks eq 1
gpu_dref AirbusFBW/EnableExternalPower eq 1
pca_dref AirbusFBW/GroundLPAir eq 1
chk_set dref AirbusFBW/Chocks 1
door_1 -1.80 0.61 -15.84

# Toliss A321
icao	A321
studio	ToLiss
pax_no_dref	AirbusFBW/NoPax
chk_dref AirbusFBW/Chocks eq 1
gpu_dref AirbusFBW/EnableExternalPower eq 1
pca_dref AirbusFBW/GroundLPAir eq 1
chk_set dref AirbusFBW/Chocks 1
door_2 -1.90 0.61 -7.65

# Toliss all other planes
icao	A[0-9N]+
studio	ToLiss
pax_no_dref	AirbusFBW/NoPax
chk_dref AirbusFBW/Chocks eq 1
gpu_dref AirbusFBW/EnableExternalPower eq 1
pca_dref AirbusFBW/GroundLPAir eq 1
chk_set dref AirbusFBW/Chocks 1

icao	B738
studio	Laminar Research modified by Zibo and Twkster
dont_connect_jetway

icao MD11
use_engines_on

icao DH8D
use_engines_on

icao R22
